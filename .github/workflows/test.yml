name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Run tests
        run: npm test

  integration:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      # Pinned: the enforcement assertions are exactly the behavior that
      # could drift between opencode releases. Bump deliberately.
      - name: Install opencode (pinned)
        run: npm install -g opencode-ai@1.17.19
      - name: Live enforcement tests (real opencode, fake provider)
        run: npm run test:integration

  # Network lane: the offline `npm test` never touches the registry, so
  # profile model-id drift is caught here instead.
  check-profiles:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Verify profile model ids against models.dev
        run: npm run check-profiles
